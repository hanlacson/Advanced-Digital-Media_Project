<!DOCTYPE html>
<html>
  <head>
<meta charset="utf-8" />
   <title>Artifice</title>
           <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
          <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.3/dist/aframe-physics-system.min.js"></script>
  </head>
  
  <body>
    <!-- Basic set up of a scene (what will be seen when the code is live)-->
    <a-scene physics="gravity: 0 -9.8 0"> 

     
      <a-assets>
         <!--Texture for the ground-->
        <img id="stoneTexture" src="https://cdn.aframe.io/a-painter/images/floor.jpg">
      </a-assets>

      <!-- Camera -->
      <a-entity position="0 0.8 4" movement-controls="speed: 0.15" kinematic-body>
        <a-camera></a-camera>
      </a-entity>

      <!-- Ground -->
    <a-plane
    position="0 -0.05 -9"
    rotation="-90 0 0"
    width="1000"
    height="1000"
    src="#stoneTexture"
    repeat="200 200"
    static-body>
  </a-plane>
    </a-scene>

  </body>
  </html>
